name: Build DNA SDK for Blender 5.1 (Python 3.13)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install SWIG
      run: choco install swig -y
        
    - name: Configure CMake (Block Windows Registry)
      run: |
        cd dnacalib
        mkdir build
        cd build
        cmake -DPython3_ROOT_DIR="${{ env.pythonLocation }}" -DPython3_FIND_REGISTRY=NEVER -DPython_FIND_REGISTRY=NEVER -DPython3_EXECUTABLE="${{ env.pythonLocation }}\python.exe" -DPython3_INCLUDE_DIR="${{ env.pythonLocation }}\include" -DPython3_LIBRARY="${{ env.pythonLocation }}\libs\python313.lib" ..
        
    - name: Build DNA SDK
      run: |
        cd dnacalib/build
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pydna-blender5.1-windows
        path: |
          dnacalib/build/**/dna.py
          dnacalib/build/**/*.pyd
          dnacalib/build/**/*.dll
