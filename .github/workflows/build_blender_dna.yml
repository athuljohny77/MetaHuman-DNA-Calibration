name: Build DNA SDK for Blender 4.2 (Python 3.11)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022 # Forces older server without Python 3.14 conflicts
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install SWIG
      run: choco install swig -y
        
    - name: Configure CMake
      run: |
        cd dnacalib
        mkdir build
        cd build
        cmake -DPYTHON3_EXACT_VERSION=3.11 ..
        
    - name: Build DNA SDK
      run: |
        cd dnacalib/build
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pydna-blender4.2-windows
        path: |
          dnacalib/build/**/dna.py
          dnacalib/build/**/*.pyd
          dnacalib/build/**/*.dll
